[general]
use_telegram = true # Enable Telegram notifications (requires bot token and chat id in env).

# Dataset definitions.
[datasets.wsm_parkinson]
base_dir = "E:/WSM/"
csv_path = "{base_dir}/parkinson/{split}_labels_segments_min_filtered.csv"
video_dir = "{base_dir}/parkinson/{split}_labels/"

[datasets.wsm_depression]
base_dir = "E:/WSM/"
csv_path = "{base_dir}/depression/{split}_labels_segments_min_filtered.csv"
video_dir = "{base_dir}/depression/{split}_labels/"

[dataloader]
num_workers = 0
shuffle = true
prepare_only = false # Extract/cache features only, skip training.

[train.general]
random_seed = 42 # Reproducibility seed.
subset_size = 0 # 0 means full dataset.
batch_size = 32
num_epochs = 100
max_patience = 10
save_best_model = true
save_prepared_data = true
save_feature_path = './features/'
search_type = "exhaustive" # "greedy" | "exhaustive" | "none"
early_stop_on = "test" # "dev" or "test"
checkpoint_dir = "checkpoints"
device = "cuda" # "cuda" or "cpu"
selection_metric = "UAR"
class_weighting = "balanced" # "balanced" or "none"
single_task = "none" # "none" | "depression" | "parkinson"
num_prototypes_per_class = 9
loss_final_weight = 1.0
loss_cls_weight = 0.0
loss_proto_weight = 0.0
prototype_alpha = 0.05
proto_similarity = "cosine" # "cosine" | "inv_euclid"
proto_temperature = 0.1
proto_proj_enabled = false
proto_proj_dim = 0 # 0 keeps hidden_dim.
print_logits = false
export_logits_raw = false # true saves raw logits instead of probabilities.

[train.model]
# Supported models: "mamba" | "transformer" | "prototypes".
model_name = "prototypes"
multi_label = false
multi_label_mode = "onehot3" # "2way" or "onehot3"
thr_dep = 0.5
thr_park = 0.5

hidden_dim = 128
out_features = 512
dropout = 0.25
gate_mode = "none" # "none" | "t" | "d" | "bt" | "bd"

# VideoFormer parameters.
num_transformer_heads = 2
positional_encoding = false
tr_layers = 5

# VideoMamba parameters.
mamba_d_state = 6
mamba_ker_size = 5
mamba_layers = 5
# mamba_d_discr = 64

[train.optimizer]
optimizer = "adamw" # "adam" | "adamw" | "lion" | "sgd" | "rmsprop"
lr = 1e-5
weight_decay = 1e-4
momentum = 0.9 # Used by SGD.

[train.scheduler]
scheduler_type = "none" # "none" | "plateau" | "cosine" | "onecycle" | HF schedulers
warmup_ratio = 0.1 # Fraction of warmup steps.

[embeddings]
average_features = "raw" # "mean" | "mean_std" | "raw"

# Feature type produced by the video extractor.
# "frame-cls": per-frame CLS embeddings [T, D].
# "frame-mean": token average per frame [T, D].
# "tokens": all non-CLS tokens flattened over time.
# "pooled": CLIP get_image_features output [T, 512].
video_output_mode = "frame-cls"

video_extractor = "openai/clip-vit-base-patch32"
yolo_weights = "./src/data_loading/best_YOLO.pt"
video_mode = "stable" # "stable" (track) | "fast" (predict)
segment_length = 60
emb_normalize = false

[cache]
per_modality_cache = true
overwrite_modality_cache = false
force_reextract = []
preprocess_version = "v1"
